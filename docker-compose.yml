services:
  golang-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agnos-golang-service
    restart: always
    environment:
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: admin
      DB_PASSWORD: secretpassword
      DB_NAME: hospital_db
      JWT_SECRET: secret
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    container_name: agnos-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - golang-service

  postgres:
    image: postgres:15-alpine
    container_name: agnos-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: hospital_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: